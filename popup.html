<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
    }
    .header {
      padding: 14px 16px 10px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .header .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    #sites-container {
      max-height: 400px;
      overflow-y: auto;
    }
    .site-card {
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a4a;
    }
    .site-card:last-child {
      border-bottom: none;
    }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .site-name {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #aaa;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.green { background: #4ade80; }
    .status-dot.yellow { background: #facc15; }
    .status-dot.gray { background: #555; }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 11px;
      color: #aaa;
    }
    .status-row .value { color: #ccc; }
    .status-row .value.ok { color: #4ade80; }
    .status-row .value.warn { color: #facc15; }
    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary {
      color: #fff;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid;
      font-size: 11px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn:hover:not(:disabled) {
      filter: brightness(0.85);
    }
    .message {
      margin-top: 8px;
      font-size: 11px;
      padding: 6px 8px;
      border-radius: 4px;
      display: none;
    }
    .message.success {
      display: block;
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }
    .message.error {
      display: block;
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
    }
    .note {
      font-size: 10px;
      color: #666;
      margin-top: 6px;
      line-height: 1.4;
    }
    .footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 10px;
      color: #555;
      border-top: 1px solid #2a2a4a;
    }
    .capture-type {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .footer a {
      color: #6366f1;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MCP Auth Bridge</h1>
    <div class="subtitle">Let Your AI Shop For You</div>
  </div>
  <div id="sites-container">
    <!-- Dynamically populated by popup.js -->
  </div>
  <div class="footer">Config-driven credential capture &middot; <a href="#" id="open-config" title="Open sites.json config">sites.json</a></div>
  <script src="popup.js"></script>
</body>
</html>
